<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760">
  <defs>
    <linearGradient id="metalFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#f6fbff"/>
      <stop offset="40%" stop-color="#dfe7f2"/>
      <stop offset="70%" stop-color="#9ca8b9"/>
      <stop offset="100%" stop-color="#f8fcff"/>
    </linearGradient>
    <linearGradient id="glossFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="accentRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5f5f"/>
      <stop offset="45%" stop-color="#ff2d2d"/>
      <stop offset="100%" stop-color="#8b0f0f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#05070d" flood-opacity="0.7"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <g transform="translate(90 130) rotate(-5 780 180)" filter="url(#shadow)">
    <path d="M60 290 C180 250 320 230 470 240 C590 248 740 268 860 252" stroke="url(#accentRed)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.88"/>
    <path d="M250 340 C420 305 590 300 760 322" stroke="url(#accentRed)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.72"/>
    <path d="M860 220 C980 212 1060 212 1160 226" stroke="url(#accentRed)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>

    <text x="0" y="240" font-family="Segoe UI, Arial Black, Impact, sans-serif" font-size="170" font-weight="900" letter-spacing="6" fill="url(#metalFill)" stroke="#1f2f46" stroke-width="4" paint-order="stroke">SURYA TEJA</text>

    <text x="0" y="240" font-family="Segoe UI, Arial Black, Impact, sans-serif" font-size="170" font-weight="900" letter-spacing="6" fill="url(#glossFill)" opacity="0.95" style="mix-blend-mode:screen">SURYA TEJA</text>

    <text x="0" y="240" font-family="Segoe UI, Arial Black, Impact, sans-serif" font-size="170" font-weight="900" letter-spacing="6" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.28">SURYA TEJA</text>
  </g>

  <g transform="translate(110 140) rotate(-10 220 90)">
    <text x="0" y="70" font-family="Segoe Script, Bradley Hand, cursive" font-size="56" font-weight="600" letter-spacing="2" fill="#f8d9d9" opacity="0.95">Gorli</text>
    <path d="M10 84 C40 78 78 78 112 90" stroke="#f9e3e3" stroke-width="2.5" stroke-linecap="round" opacity="0.7" fill="none"/>
  </g>

  <text x="1380" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="3" fill="#e8edf6" opacity="0.94">/25</text>
</svg>
